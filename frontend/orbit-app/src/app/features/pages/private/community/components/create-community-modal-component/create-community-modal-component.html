<form [formGroup]="communityForm" class="flex flex-col gap-6 relative">
  @if (isSubmitting()) {
    <div
      class="absolute inset-0 z-10 bg-base-100/60 backdrop-blur-sm flex items-center justify-center rounded-b-3xl"
    >
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  }

  <div class="flex flex-col gap-2">
    <label class="text-sm font-bold text-base-content/90 ml-1"> Nombre de la comunidad </label>

    <div
      class="input input-bordered flex items-center gap-2 bg-base-200/30 focus-within:bg-base-100 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all shadow-sm"
      [class.opacity-60]="communityToEdit()"
      [class.cursor-not-allowed]="communityToEdit()"
      [class.bg-base-200]="communityToEdit()"
    >
      <span class="text-base-content/40 font-black select-none">c/</span>
      <input
        type="text"
        formControlName="name"
        placeholder="desarrolladores"
        class="grow bg-transparent text-base-content outline-none disabled:text-base-content/60 disabled:cursor-not-allowed font-medium"
      />
    </div>

    @if (!communityToEdit()) {
      <span class="text-xs text-base-content/50 ml-2 flex items-center gap-1.5 font-medium">
        <i class="fa-solid fa-circle-info text-[10px]"></i>
        El nombre no se podrá cambiar después.
      </span>
    }
  </div>

  <div class="flex flex-col gap-2">
    <label class="text-sm font-bold text-base-content/90 ml-1">
      Descripción <span class="text-base-content/40 font-normal ml-1">(Opcional)</span>
    </label>

    <textarea
      formControlName="description"
      class="textarea textarea-bordered bg-base-200/30 focus:bg-base-100 focus:ring-2 focus:ring-primary/20 focus:border-primary resize-none h-28 text-[15px] transition-all shadow-sm leading-relaxed"
      placeholder="¿Cuál es el propósito principal de esta comunidad?"
    ></textarea>
  </div>

  <div class="flex flex-col gap-2">
    <span class="text-sm font-bold text-base-content/90 ml-1">Privacidad</span>

    <label
      class="cursor-pointer group flex items-start gap-4 p-4 rounded-2xl border border-base-content/10 bg-base-100 hover:border-primary/40 hover:bg-base-200/30 transition-all shadow-sm"
    >
      <div class="flex-shrink-0 mt-1">
        <input type="checkbox" formControlName="isPrivate" class="toggle toggle-primary" />
      </div>
      <div class="flex flex-col">
        <span class="font-bold text-base-content flex items-center gap-2 text-[15px]">
          <i
            class="fa-solid fa-lock text-base-content/50 group-hover:text-primary transition-colors"
          ></i>
          Comunidad Privada
        </span>
        <span class="text-sm text-base-content/60 mt-1.5 leading-relaxed pr-2">
          Solo los miembros aprobados podrán ver el contenido y participar en las publicaciones de
          esta comunidad.
        </span>
      </div>
    </label>
  </div>

  @if (errorMessage()) {
    <div
      class="p-4 bg-error/10 text-error text-sm font-bold rounded-2xl flex items-start gap-3 mt-2 border border-error/20"
    >
      <i class="fa-solid fa-triangle-exclamation mt-0.5 text-base"></i>
      <span>{{ errorMessage() }}</span>
    </div>
  }
</form>
