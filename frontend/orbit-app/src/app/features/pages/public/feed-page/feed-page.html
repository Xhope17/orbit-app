<div
  class="flex flex-col w-full min-h-screen pb-20 bg-base-100 border-x border-base-content/5 relative"
>
  <div
    class="sticky top-0 z-10 bg-base-100/80 backdrop-blur-lg border-b border-base-content/5 px-4 py-3 flex items-center justify-between shadow-sm"
  >
    <h1
      class="text-xl font-black tracking-tight bg-gradient-to-r from-teal-400 to-cyan-500 bg-clip-text text-transparent cursor-pointer w-fit hover:opacity-80 transition-opacity"
    >
      Inicio
    </h1>
    <button
      class="btn btn-ghost btn-sm btn-circle text-base-content/50 hover:text-teal-400 transition-colors"
    >
      <i class="fa-solid fa-arrows-rotate text-sm"></i>
    </button>
  </div>

  <div class="hidden sm:block px-4 py-4 border-b border-base-content/5 bg-base-100">
    <div
      class="flex items-center gap-3 bg-base-200/50 p-2.5 rounded-[2rem] ring-1 ring-base-content/5 hover:ring-teal-500/30 transition-all duration-300"
    >
      <div class="avatar shadow-sm ml-1">
        <div class="bg-neutral text-neutral-content rounded-full w-10 ring-2 ring-base-100">
          @if (userProfile()?.avatarUrl) {
            <img [src]="userProfile()?.avatarUrl" class="w-full h-full object-cover" />
          } @else {
            <img src="/images/default.png" class="w-full h-full object-cover" />
          }
        </div>
      </div>

      <button
        class="flex-1 text-left text-base-content/50 bg-transparent px-3 py-2 text-[15px] font-medium hover:text-base-content/80 outline-none transition-colors"
        (click)="abrirModalPost()"
      >
        Escribe algo...
      </button>

      <button
        class="btn bg-teal-600 hover:bg-teal-500 text-white border-none rounded-full px-6 btn-sm h-10 shadow-md shadow-teal-900/20 hover:scale-105 transition-transform mr-1"
        (click)="abrirModalPost()"
      >
        Publicar
      </button>
    </div>
  </div>

  <div class="flex flex-col px-2 sm:px-4 pt-4 bg-base-200/10 min-h-screen">
    @if (isLoading()) {
      <div class="p-12 flex justify-center">
        <span class="loading loading-spinner loading-lg text-teal-500"></span>
      </div>
    } @else {
      @for (item of posts(); track item.id) {
        <app-post-card
          [post]="item"
          [currentUserId]="authService.payload()?.profile_id ?? null"
          (onDelete)="handleDeletePost($event)"
          (onLike)="handleLikePost($event)"
        ></app-post-card>
      } @empty {
        <div
          class="flex flex-col items-center justify-center p-10 text-center mt-6 bg-base-100 rounded-[2rem] border border-base-content/5 shadow-sm"
        >
          <div
            class="w-16 h-16 mb-4 rounded-full bg-base-200/50 flex items-center justify-center text-base-content/40 text-2xl"
          >
            <i class="fa-solid fa-satellite-dish"></i>
          </div>
          <h2 class="text-xl font-bold text-base-content mb-2 tracking-tight">
            No hay publicaciones
          </h2>
          <p class="text-sm text-base-content/60 max-w-xs mb-6">
            Tu feed está vacío. Sigue a otros usuarios para empezar a ver contenido aquí.
          </p>
        </div>
      }
    }
  </div>

  <button
    class="sm:hidden fixed bottom-24 right-4 z-50 btn btn-circle h-14 w-14 bg-teal-600 hover:bg-teal-500 text-white border-none shadow-lg shadow-teal-900/40 hover:scale-105 transition-transform"
    (click)="abrirModalPost()"
  >
    <i class="fa-solid fa-feather-pointed text-xl"></i>
  </button>
</div>
