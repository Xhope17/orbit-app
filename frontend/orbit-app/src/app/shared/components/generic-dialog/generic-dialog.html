<dialog [id]="modalId()" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box bg-base-100 p-0 overflow-hidden w-full max-w-xl border border-base-300 shadow-2xl rounded-3xl">

    <div class="flex justify-between items-center p-4 border-b border-base-200 sticky top-0 z-20 bg-base-100/90 backdrop-blur-md">
      <div class="flex items-center gap-4">
        <button type="button" (click)="closeModal()" class="btn btn-sm btn-circle btn-ghost text-base-content/70 hover:bg-base-200">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
        <h3 class="font-extrabold text-xl tracking-tight">{{ title() }}</h3>
      </div>

      <button
        (click)="onSave.emit()"
        class="btn btn-sm rounded-full font-bold px-6 shadow-md"
        [class]="btnColor()"
      >
        {{ btnText() }}
      </button>
    </div>

    <div class="p-6 max-h-[70vh] overflow-y-auto no-scrollbar">
      <ng-content></ng-content>
    </div>

  </div>

  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
