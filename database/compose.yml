services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xclone-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EPico123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data-boot:/var/opt/mssql

volumes:
  sqlserver-data-boot: