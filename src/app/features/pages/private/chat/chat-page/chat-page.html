<div
  class="flex h-[calc(100vh-60px)] w-full max-w-3xl mx-auto bg-base-100 md:border-x border-base-content/5 overflow-hidden"
>
  @if (!activeConversation()) {
    <chat-sidebar-component
      class="w-full h-full"
      [conversations]="conversations()"
      [loading]="loadingConversations()"
      [onlineUsers]="signalrService.onlineUsers()"
      (onSelect)="selectConversation($event)"
      (onCreateConv)="createConversation($event)"
    ></chat-sidebar-component>
  } @else {
    <chat-area-component
      class="w-full h-full"
      [conversation]="activeConversation()!"
      [messages]="messages()"
      [currentProfileId]="currentProfileId()"
      [loading]="loadingMessages()"
      [typingProfile]="typingUser()"
      [onlineUsers]="signalrService.onlineUsers()"
      (onSendMessage)="sendMessage($event)"
      (onTyping)="onTyping()"
      (onGoBack)="closeConversation()"
    ></chat-area-component>
  }
</div>
