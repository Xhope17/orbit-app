<div class="flex flex-col h-full bg-base-100 w-full">
  <div class="p-4 border-b border-base-content/10">
    <h1 class="text-2xl font-black mb-4">Mensajes</h1>
    <div class="flex gap-2">
      <div class="relative flex-1">
        <i
          class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40 text-sm"
        ></i>
        <input
          [(ngModel)]="newUsername"
          placeholder="Buscar usuario..."
          class="input input-sm h-10 w-full pl-9 bg-base-200/50 focus:bg-base-100 rounded-full border-none ring-1 ring-base-content/10 focus:ring-primary/50"
          (keyup.enter)="handleCreate()"
        />
      </div>
      <button
        class="btn btn-sm h-10 btn-circle btn-primary shadow-sm"
        (click)="handleCreate()"
        [disabled]="!newUsername().trim()"
      >
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto w-full">
    @if (loading()) {
      <div class="flex justify-center p-6">
        <span class="loading loading-spinner text-primary"></span>
      </div>
    } @else if (conversations().length === 0) {
      <div class="p-6 text-center text-base-content/50 mt-4">
        <p class="font-medium">No tienes chats aún</p>
      </div>
    } @else {
      <div class="flex flex-col p-2 gap-1 w-full">
        @for (conv of conversations(); track conv.id) {
          <button
            class="w-full p-3 rounded-2xl flex gap-3 items-center hover:bg-base-200 transition-colors text-left group"
            (click)="onSelect.emit(conv)"
          >
            <user-avatar-component
              [avatarUrl]="conv.otherParticipant.avatarUrl"
              [displayName]="conv.otherParticipant.displayName"
              [size]="12"
              [online]="onlineUsers().has(conv.otherParticipant.profileId)"
            />

            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-baseline mb-0.5">
                <span
                  class="font-bold text-[15px] truncate text-base-content group-hover:text-primary transition-colors"
                >
                  {{ conv.otherParticipant.displayName }}
                </span>
                @if (conv.lastMessage) {
                  <span class="text-[11px] font-medium text-base-content/40 shrink-0 ml-2">
                    {{ conv.lastMessage.createdAt | localDate:'shortTime' }}
                  </span>
                }
              </div>

              <div class="flex justify-between items-center pr-1">
                <p
                  class="text-sm truncate"
                  [class.text-base-content]="conv.unreadCount > 0"
                  [class.text-base-content/50]="conv.unreadCount === 0"
                  [class.font-bold]="conv.unreadCount > 0"
                >
                  @if (conv.lastMessage) {
                    @if (conv.isLastMessageFromCurrentUser) {
                      <span class="mr-1"
                        ><i
                          class="fa-solid fa-check-double text-[10px]"
                          [class.text-info]="conv.lastMessage.isSeen"
                        ></i
                      ></span>
                    }
                    {{ conv.lastMessage.content }}
                  } @else {
                    <span class="italic">Inicia la conversación...</span>
                  }
                </p>
                @if (conv.unreadCount > 0) {
                  <div class="badge badge-primary badge-sm">{{ conv.unreadCount }}</div>
                }
              </div>
            </div>
          </button>
        }
      </div>
    }
  </div>
</div>
